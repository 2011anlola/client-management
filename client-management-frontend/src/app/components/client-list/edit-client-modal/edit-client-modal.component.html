<div class="modal fade" id="editClientModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Client</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <form (ngSubmit)="updateClient()" #editForm="ngForm">

          <div class="mb-3">
            <label class="form-label">Name *</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="editClient.name"
              name="name"
              required
              #name="ngModel"
              [class.is-invalid]="name.invalid && name.touched"
            >
            <div class="invalid-feedback" *ngIf="name.invalid && name.touched">
              Name is required
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="editClient.email"
              name="email"
              email
              #email="ngModel"
              [class.is-invalid]="email.invalid && email.touched"
            >
            <div class="invalid-feedback" *ngIf="email.invalid && email.touched">
              Please enter a valid email address
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="editClient.phone"
              name="phone"
              [pattern]="editClient.phone && editClient.phone.trim() ? '^\\+?[0-9\\-]+$' : '.*'"
              #phone="ngModel"
              [class.is-invalid]="phone.invalid && phone.touched"
            >
            <div class="invalid-feedback" *ngIf="phone.invalid && phone.touched">
              Phone number can only contain digits and an optional + prefix (e.g., +1234567890 or 1234567890)
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Address</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="editClient.address"
              name="address"
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Country</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="editClient.country"
              name="country"
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Status</label>
            <select
              class="form-select"
              [(ngModel)]="editClient.status"
              name="status"
            >
              <option [ngValue]="'ACTIVE'">ACTIVE</option>
              <option [ngValue]="'INACTIVE'">INACTIVE</option>
            </select>
          </div>

          <div class="text-end">
            <button
              type="button"
              class="btn btn-secondary me-2"
              data-bs-dismiss="modal"
              (click)="closeModal()"
            >
              Cancel
            </button>

            <button
              type="submit"
              class="btn btn-primary"
            >
              {{ isSubmitting ? 'Saving...' : 'Save Changes' }}
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>
