<div class="modal fade" id="createClientModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-light">

      <div class="modal-header">
        <h5 class="modal-title">Create Client</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <form (ngSubmit)="createClient()">

          <div class="mb-3">
            <label>Name</label>
            <input class="form-control" [(ngModel)]="newClient.name" name="name" required>
          </div>

          <div class="mb-3">
            <label>Email</label>
            <input class="form-control" [(ngModel)]="newClient.email" name="email">
          </div>

          <div class="mb-3">
            <label>Phone</label>
            <input class="form-control" [(ngModel)]="newClient.phone" name="phone">
          </div>

          <div class="mb-3">
            <label>Address</label>
            <input class="form-control" [(ngModel)]="newClient.address" name="address">
          </div>

          <div class="mb-3">
            <label>Country</label>
            <input class="form-control" [(ngModel)]="newClient.country" name="country">
          </div>


          <button class="btn btn-success" type="submit">
            Create Client
          </button>

        </form>

      </div>

    </div>
  </div>
</div>
