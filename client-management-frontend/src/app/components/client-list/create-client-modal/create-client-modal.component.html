<div class="modal fade" id="createClientModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-light">

      <div class="modal-header">
        <h5 class="modal-title">Create Client</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <form (ngSubmit)="createClientHandler()" #createForm="ngForm">

          <div class="mb-3">
            <label class="form-label">Name *</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="newClient.name"
              name="name"
              required
              #name="ngModel"
              [class.is-invalid]="name.invalid && name.touched"
            >
            <div class="invalid-feedback" *ngIf="name.invalid && name.touched">
              Name is required
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="newClient.email"
              name="email"
              email
              #email="ngModel"
              [class.is-invalid]="email.invalid && email.touched"
            >
            <div class="invalid-feedback" *ngIf="email.invalid && email.touched">
              Please enter a valid email address
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="newClient.phone"
              name="phone"
              [pattern]="newClient.phone && newClient.phone.trim() ? '^\\+?[0-9\\-]+$' : '.*'"
              #phone="ngModel"
              [class.is-invalid]="phone.invalid && phone.touched"
            >
            <div class="invalid-feedback" *ngIf="phone.invalid && phone.touched">
              Phone number can only contain digits and an optional + prefix (e.g., +1234567890 or 1234567890)
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Address</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="newClient.address"
              name="address"
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Country</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="newClient.country"
              name="country"
            >
          </div>

          <div class="text-end">
            <button
              type="button"
              class="btn btn-secondary me-2"
              data-bs-dismiss="modal"
              (click)="closeModal()"
            >
              Cancel
            </button>

            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="isSubmitting"
            >
              {{ isSubmitting ? 'Creating...' : 'Create Client' }}
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>
