<div class="container mt-4">

  <h2 class="mb-4">Full Client List</h2>
  <div class="d-flex justify-content-between p-3">
    <button
      class="btn btn-success"
      type="button"
      (click)="openCreateModal()">
      + Create Client
    </button>

    <button class="btn btn-secondary" (click)="clearFilters()">
      Clear All Filters
    </button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">

      <table class="table table-hover table-striped align-middle">
        <thead>
        <tr>
          <th class="text-center">Name</th>
          <th class="text-center">Email</th>
          <th class="text-center">Phone</th>
          <th class="text-center">Address</th>
          <th class="text-center">Country</th>
          <th class="text-center">Status</th>
          <th class="text-center">Created</th>
          <th class="text-center">Actions</th>
        </tr>

        <tr>
          <th>
            <input class="form-control form-control-sm"
                   placeholder="Search by name..."
                   [(ngModel)]="filters.name"
                   (input)="applyFilters()">
          </th>

          <th>
            <input class="form-control form-control-sm"
                   placeholder="Search by email..."
                   [(ngModel)]="filters.email"
                   (input)="applyFilters()">
          </th>

          <th>
            <input class="form-control form-control-sm"
                   placeholder="Search by phone..."
                   [(ngModel)]="filters.phone"
                   (input)="applyFilters()">
          </th>

          <th>
            <input class="form-control form-control-sm"
                   placeholder="Search by address..."
                   [(ngModel)]="filters.address"
                   (input)="applyFilters()">
          </th>

          <th>
            <input class="form-control form-control-sm"
                   placeholder="Search by country..."
                   [(ngModel)]="filters.country"
                   (input)="applyFilters()">
          </th>

          <th>
            <select
              class="form-select form-select-sm"
              [(ngModel)]="filters.status"
              (change)="applyFilters()">

              <option value="">All</option>
              <option value="ACTIVE">Active</option>
              <option value="INACTIVE">Inactive</option>

            </select>
          </th>

          <th>
            <input
              type="date"
              class="form-control form-control-sm"
              [(ngModel)]="filters.createdAt"
              (input)="applyFilters()"
            />
          </th>
          <th></th>
        </tr>
        </thead>

        <tbody>
          @for (client of filteredClients; track client.id) {
            <tr>
              <td class="fw-semibold">{{ client.name }}</td>
              <td>{{ client.email }}</td>
              <td>{{ client.phone }}</td>
              <td>{{ client.address }}</td>
              <td>{{ client.country }}</td>

              <td class="text-center">
                <span
                  class="badge"
                  [class.bg-success]="client.status === 'ACTIVE'"
                  [class.bg-secondary]="client.status === 'INACTIVE'"
                >
                  {{ client.status }}
                </span>
              </td>

              <td>{{ client.createdAt | date:'dd/MM/yy - HH:mm' }}</td>

              <td>
                <div class="mt-auto d-flex justify-content-center align-items-center">
                  <button
                    class="btn btn-sm btn-primary me-2"
                    (click)="editClient(client)"
                    type="button"
                  >
                    Edit
                  </button>
                  <button
                    class="btn btn-sm btn-danger"
                    (click)="deleteClient(client)"
                    type="button">
                    Delete
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>

      </table>

    </div>
  </div>

</div>

<app-edit-client-modal
  [client]="selectedClient"
  (clientUpdated)="loadClients()"
></app-edit-client-modal>

<app-create-client-modal
  [showCreateModal]="showCreateModal"
  (clientCreated)="onClientCreated($event)">
</app-create-client-modal>

<app-delete-client-modal
  [client]="selectedClientForDelete"
  (clientDeleted)="onClientDeleted($event)">
</app-delete-client-modal>
